services:
  neuromem-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: neuromem-agents:latest
    command:
      - neuromem-openai-server
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      NEUROMEM_CHAT_PROVIDER: ${NEUROMEM_CHAT_PROVIDER:-openai}
      NEUROMEM_CHAT_MODEL: ${NEUROMEM_CHAT_MODEL:-your-upstream-model}
      NEUROMEM_CHAT_BASE_URL: ${NEUROMEM_CHAT_BASE_URL:-}
      NEUROMEM_MEMORY_DB_PATH: /data/neuromem.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - neuromem_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  neuromem-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: neuromem-agents:latest
    command:
      - neuromem-mcp-server
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "8765"
    environment:
      NEUROMEM_MEMORY_DB_PATH: /data/neuromem.db
      NEUROMEM_MCP_TRANSPORT: streamable-http
      NEUROMEM_MCP_HOST: 0.0.0.0
      NEUROMEM_MCP_PORT: "8765"
      NEUROMEM_MCP_STREAMABLE_HTTP_PATH: /mcp
      NEUROMEM_MCP_JSON_RESPONSE: "true"
      NEUROMEM_MCP_STATELESS_HTTP: "true"
    ports:
      - "8765:8765"
    volumes:
      - neuromem_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8765), 3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  neuromem_data:
